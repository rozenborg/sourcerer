  # --- YouTube channels (uses captions; videos without captions are skipped) ---
  # channel_url accepts any YouTube channel URL form (handle, /channel/UC..., /@name)
  - id: sequoia-capital
    name: "Sequoia Capital"
    type: youtube
    channel_url: https://www.youtube.com/@SequoiaCapital

  - id: lennys-podcast
    name: "Lenny's Podcast"
    type: youtube
    channel_url: https://www.youtube.com/@LennysPodcast

  # --- Scholarly papers (Mollick-style filter via Semantic Scholar recommender) ---
  - id: scholarly-mollick-style
    name: "Scholarly (Mollick-style)"
    type: scholarly
    score_threshold: 12       # rubric §9.1 calls 12-15 "strong candidate"
    max_candidates: 200       # wider net — recommender's tail starts to thin out beyond this
    max_posts: 15
    lookback_days: 90
    seed_papers:
      # Mollick-publicly-surfaced papers (§8.1 of the reference doc)
      - "ARXIV:2302.06590"                                          # Peng et al. — GitHub Copilot productivity
      - "DOI:10.1126/science.adh2586"                               # Noy & Zhang — ChatGPT writing productivity
      - "ARXIV:2303.01157"                                          # Felten, Raj, Seamans — occupation exposure
      - "Navigating the Jagged Technological Frontier: Field Experimental Evidence of the Effects of AI on Knowledge Worker Productivity and Quality"  # Dell'Acqua et al., BCG
      - "Falling Asleep at the Wheel: Human/AI Collaboration in a Field Experiment on HR Recruiters"  # Dell'Acqua, HR
      - "The Cybernetic Teammate: A Field Experiment on Generative AI Reshaping Teamwork and Expertise"  # Dell'Acqua et al., P&G
      - "Generative AI at Work"                                     # Brynjolfsson, Li, Raymond — NBER w31161
      - "Lawyering in the Age of Artificial Intelligence"           # Choi & Schwarcz (also published as "AI Assistance in Legal Analysis")
      - "DOI:10.1126/sciadv.adn5290"                                # Doshi & Hauser — creativity & homogenization
      - "DOI:10.1001/jamanetworkopen.2024.40969"                    # Goh et al. — JAMA RCT on diagnostic reasoning
      - "From Chalkboards to Chatbots: Evaluating the Impact of Generative AI on Learning Outcomes in Nigeria"
      - "ARXIV:2506.08872"                                          # Kosmyna et al. — cognitive debt
      # Mollick-aligned extensions (§8.2)
      - "The Effects of Generative AI on High Skilled Work: Evidence from Three Field Experiments with Software Developers"  # Cui et al.
      - "AI-Powered Lawyering: AI Reasoning Models, Retrieval Augmented Generation, and the Future of Legal Practice"  # Schwarcz et al.
      - "Intelligent financial system: how AI is transforming finance"  # BIS Aldasoro et al.

  # --- NBER working papers (Mollick-likeness scored) ---
  - id: scholarly-nber
    name: "NBER Working Papers (filtered)"
    type: scholarly_rss
    feed_urls:
      - https://www.nber.org/rss/new.xml
    score_threshold: 12
    lookback_days: 60
    max_posts: 10

  # --- arXiv HCI + Computers and Society (Mollick-likeness scored) ---
  # Skipping cs.AI (~500 entries/day, too noisy/expensive); cs.HC and cs.CY
  # are the categories where AI-and-work papers actually live.
  - id: scholarly-arxiv
    name: "arXiv HCI + Society (filtered)"
    type: scholarly_rss
    feed_urls:
      - https://export.arxiv.org/rss/cs.HC
      - https://export.arxiv.org/rss/cs.CY
    score_threshold: 14
    lookback_days: 14
    max_posts: 10

settings:
  lookback_days: 3
  max_posts_per_source: 5
  summarization_model: claude-sonnet-4-20250514
  scoring_model: claude-haiku-4-5-20251001
