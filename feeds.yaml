sources:
  # --- RSS / Substack (full content usually available in feed) ---
  - id: mollick-one-useful-thing
    name: "One Useful Thing (Ethan Mollick)"
    type: rss
    feed_url: https://www.oneusefulthing.org/feed

  - id: openai-blog
    name: "OpenAI Blog"
    type: rss
    feed_url: https://openai.com/news/rss.xml

  - id: ken-huang-ai-expert
    name: "Ken Huang | AI Expert"
    type: rss
    feed_url: https://substack-proxy.rozenborg.workers.dev/?url=https://kenhuangus.substack.com/feed

  - id: khemaridh-future-proof
    name: "Future-Proof Your Career"
    type: rss
    feed_url: https://substack-proxy.rozenborg.workers.dev/?url=https://khemaridh.substack.com/feed

  - id: ai-collective
    name: "The AI Collective"
    type: rss
    feed_url: https://substack-proxy.rozenborg.workers.dev/?url=https://aicollective.substack.com/feed

  - id: hbr
    name: "Harvard Business Review"
    type: rss
    feed_url: http://feeds.hbr.org/harvardbusiness
    keywords: [AI, Artificial Intelligence, GenAI, Generative AI, ChatGPT, LLM, Machine Learning, Automation, Agentic]

  - id: real-estate-news
    name: "Real Estate News"
    type: rss
    feed_url: https://www.realestatenews.com/rss
    keywords: [AI, Artificial Intelligence, ChatGPT, LLM, Machine Learning, Automation]

  # --- Sitemaps ---
  - id: anthropic-blog
    name: "Anthropic Blog"
    type: sitemap
    url: https://www.anthropic.com/sitemap.xml
    url_pattern: "/news/"

  - id: builtin-com
    name: "Built In"
    type: sitemap
    url: https://builtin.com/sitemap.xml
    url_pattern: "/articles/"
    keywords: [AI, Artificial Intelligence, ChatGPT, LLM, Machine Learning, Automation]

  - id: ey-com
    name: "EY Insights"
    type: sitemap
    url: https://www.ey.com/en_nl/sitemap/insights.xml
    url_pattern: "/insights/ai/"
    keywords: [AI, Artificial Intelligence, Agentic, GenAI, Generative AI, LLM]

  # --- Podcasts ---
  - id: a16z-podcast
    name: "The a16z Show"
    type: podcast
    feed_url: https://feeds.simplecast.com/JGE3yC0V

  - id: dwarkesh-podcast
    name: "Dwarkesh Podcast"
    type: podcast
    feed_url: https://apple.dwarkesh-podcast.workers.dev/feed.rss
    notes: "Long episodes (2-3 hrs)"

  - id: no-priors
    name: "No Priors"
    type: podcast
    feed_url: https://feeds.megaphone.fm/nopriors

  - id: latent-space
    name: "Latent Space"
    type: podcast
    feed_url: https://substack-proxy.rozenborg.workers.dev/?url=https://api.substack.com/feed/podcast/1084089.rss

  - id: ai-daily-brief
    name: "AI Daily Brief"
    type: podcast
    feed_url: https://feeds.podcastai.com/lzSp5oGSGEaLNzHdqUBaTh.xml
    notes: "Short daily episodes (~10 min)"

  # --- YouTube channels (uses captions; videos without captions are skipped) ---
  # channel_url accepts any YouTube channel URL form (handle, /channel/UC..., /@name)
  - id: sequoia-capital
    name: "Sequoia Capital"
    type: youtube
    channel_url: https://www.youtube.com/@SequoiaCapital

  - id: lennys-podcast
    name: "Lenny's Podcast"
    type: youtube
    channel_url: https://www.youtube.com/@LennysPodcast

  # --- Scholarly papers (Mollick-style filter via Semantic Scholar recommender) ---
  - id: scholarly-mollick-style
    name: "Scholarly (Mollick-style)"
    type: scholarly
    score_threshold: 12       # rubric §9.1 calls 12-15 "strong candidate"
    max_candidates: 200       # wider net — recommender's tail starts to thin out beyond this
    max_posts: 15
    lookback_days: 90
    # Pre-resolved canonical IDs bundle (~74 S2_RESOLVED + 28 EXTERNAL_ID_ONLY rows).
    # Every seed has a verified ID — no S2 title-search calls needed.
    seed_jsonl: reference_material/ethan_mollick_seed_corpus_ids_bundle/ethan_mollick_seed_corpus_with_canonical_ids.jsonl
    # Restrict to A/B priority rows (drop C-priority weak attributions)
    seed_priorities: ["A", "B"]
    # Optional inline overflow — paste new DOIs/arXivs/titles here as you find them.
    # Resolved at runtime. Leave empty if everything you want is in the bundle.
    seed_papers: []

  # --- Author watchlist (full coverage; no Mollick-likeness scoring) ---
  # Pulls every recent paper by these authors directly via Semantic Scholar's
  # author/papers endpoint. Bypass the rubric — papers from these specific
  # researchers are surfaced regardless of abstract content.
  - id: scholarly-watchlist-authors
    name: "Scholarly (Watchlist Authors)"
    type: scholarly_authors
    lookback_days: 180
    max_posts: 25
    authors:
      # §8.1 — AI, work, productivity, organizations
      - "Ethan Mollick"
      - "Lilach Mollick"
      - "Fabrizio Dell'Acqua"
      - "Karim Lakhani"
      - "Hila Lifshitz-Assaf"
      - "Katherine Kellogg"
      - "Raffaella Sadun"
      - "Edward McFowland III"
      - "Charles Ayoubi"
      - "Lindsey Raymond"
      - "Danielle Li"
      - "Erik Brynjolfsson"
      # §8.2 — Economics, labor, exposure
      - "Edward Felten"
      - "Manav Raj"
      - "Robert Seamans"
      - "David Autor"
      - "Daron Acemoglu"
      - "Mert Demirer"
      - "Sida Peng"
      - "Sonia Jaffe"
      # §8.3 — Legal, compliance, reasoning-heavy
      - "Daniel Schwarcz"
      - "Jonathan Choi"
      - "Sam Manning"
      # §8.4 — Medicine, human-AI judgment
      - "Ethan Goh"
      - "Jonathan Chen"
      - "Adam Rodman"
      - "Eric Horvitz"
      - "Anil Doshi"
      - "Oliver Hauser"
      - "Christian Terwiesch"
      - "Lennart Meincke"

  # --- NBER working papers (Mollick-likeness scored) ---
  - id: scholarly-nber
    name: "NBER Working Papers (filtered)"
    type: scholarly_rss
    feed_urls:
      - https://www.nber.org/rss/new.xml
    score_threshold: 12
    lookback_days: 60
    max_posts: 10

  # --- arXiv HCI + Computers and Society (Mollick-likeness scored) ---
  # Skipping cs.AI (~500 entries/day, too noisy/expensive); cs.HC and cs.CY
  # are the categories where AI-and-work papers actually live.
  - id: scholarly-arxiv
    name: "arXiv HCI + Society (filtered)"
    type: scholarly_rss
    feed_urls:
      - https://export.arxiv.org/rss/cs.HC
      - https://export.arxiv.org/rss/cs.CY
    score_threshold: 14
    lookback_days: 14
    max_posts: 10

settings:
  lookback_days: 3
  max_posts_per_source: 5
  summarization_model: claude-sonnet-4-20250514
  scoring_model: claude-haiku-4-5-20251001
