name: SourcererApp
options:
  bundleIdPrefix: com.rozenborg.sourcerer
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "3A38872634"   # Personal Team. Swap to paid team ID once that membership activates.
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targets:
  SourcererApp:
    type: application
    platform: iOS
    sources:
      - path: SourcererApp
    resources:
      - path: SourcererApp/Resources
    info:
      path: SourcererApp/Info.plist
      properties:
        CFBundleDisplayName: Sourcerer
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [armv7]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rozenborg.sourcerer
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: Supabase
        product: Supabase
      - package: MarkdownUI
        product: MarkdownUI
    # Sign in with Apple entitlement removed temporarily — Personal Team
    # accounts can't sign apps with it. Restore the entitlements: block
    # below once the paid Apple Developer Program membership activates:
    #
    # entitlements:
    #   path: SourcererApp/SourcererApp.entitlements
    #   properties:
    #     com.apple.developer.applesignin:
    #       - Default
