name: SourcererApp
options:
  bundleIdPrefix: com.rozenborg.sourcerer
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""   # Fill in your Apple Developer team ID after first open
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targets:
  SourcererApp:
    type: application
    platform: iOS
    sources:
      - path: SourcererApp
        excludes:
          - "Resources/Secrets.plist"   # never bake secrets into the bundle source list
    resources:
      - path: SourcererApp/Resources
    info:
      path: SourcererApp/Info.plist
      properties:
        CFBundleDisplayName: Sourcerer
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [armv7]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rozenborg.sourcerer
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: Supabase
        product: Supabase
      - package: MarkdownUI
        product: MarkdownUI
    entitlements:
      path: SourcererApp/SourcererApp.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
