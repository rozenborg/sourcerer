name: Resummarize pending

# Picks up articles that the main daily pull (08:00 UTC) inserted with
# summary=NULL — typically because Gemini was briefly unavailable. Runs
# one hour after the main cron so transient API hiccups get a second
# chance, then falls back to Sonnet if Gemini is still down.
#
# Schedule: 09:00 UTC daily (= 4am EST / 5am EDT).

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  resummarize:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run resummarize
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python resummarize_pending.py
